version: '3.8'

services:
  db:
    image: postgres:18-alpine
    container_name: booking_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ticket_booking
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ticket_booking"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: ./backend
    container_name: booking_web
    volumes:
      - ./backend:/app
      - ./frontend:/frontend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/ticket_booking
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
